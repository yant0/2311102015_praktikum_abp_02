<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <title>Data Tabel</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="index.html">Hutanger</a>
                <div class="navbar-nav">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link active" href="tabel.html">Data Penghutangs</a>
                    <a class="nav-link" href="form.html">Form Tambah</a>
                </div>
            </div>
        </nav>
        <div class="container">
            <h2>Data Penghutangs</h2>
            <table id="userTable" class="table table-bordered table-striped w-100">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Doksli</th>
                        <th>Hutang</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
            </table>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
        <script>
            $(document).ready(function () {
                let table = $('#userTable').DataTable({
                    ajax: '/api/users',
                    columns: [
                        { data: 'id' },
                        { data: 'nama' },
                        { data: 'address' },
                        { data: 'hutang' },
                        {
                            data: null,
                            render: function (data, type, row) {
                                return `
                            <a href="form.html?id=${row.id}" class="btn btn-sm btn-warning">Edit</a>
                            <button class="btn btn-sm btn-danger btn-hapus" data-id="${row.id}">Hapus</button>`;
                            }
                        }
                    ]
                });

                $('#userTable').on('click', '.btn-hapus', function () {
                    let id = $(this).data('id');
                    if (confirm('Hapus data ini?')) {
                        $.ajax({
                            url: '/api/users/' + id,
                            type: 'DELETE',
                            success: function () { table.ajax.reload(); }
                        });
                    }
                });
            });
        </script>
    </body>
</html>
