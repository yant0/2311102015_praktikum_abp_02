<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <title>Form Data</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="index.html">Hutanger</a>
                <div class="navbar-nav">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="tabel.html">Data Penghutangs</a>
                    <a class="nav-link active" href="form.html">Form Tambah/Edit</a>
                </div>
            </div>
        </nav>
        <div class="container">
            <h2 id="formTitle">Tambah Penghutangs</h2>
            <form id="userForm">
                <div class="mb-3">
                    <label>Nama</label>
                    <input type="text" name="nama" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Doksli</label>
                    <input type="text" name="address" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Hutang</label>
                    <input type="number" name="hutang" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Simpan Data</button>
            </form>
        </div>

        <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
        <script>
            $(document).ready(function () {
                const urlParams = new URLSearchParams(window.location.search);
                const editId = urlParams.get('id');

                if (editId) {
                    $('#formTitle').text('Edit User');
                    $.get('/api/users', function (res) {
                        const user = res.data.find(u => u.id == editId);
                        if (user) {
                            $('[name=nama]').val(user.nama);
                            $('[name=address]').val(user.address);
                            $('[name=hutang]').val(user.hutang);
                        }
                    });
                }

                $('#userForm').submit(function (e) {
                    e.preventDefault();
                    const type = editId ? 'PUT' : 'POST';
                    const url = editId ? `/api/users/${editId}` : '/api/users';

                    $.ajax({
                        url: url,
                        type: type,
                        data: $(this).serialize(),
                        success: function () {
                            alert('Data berhasil disimpan!');
                            window.location.href = 'tabel.html';
                        }
                    });
                });
            });
        </script>
    </body>
</html>
